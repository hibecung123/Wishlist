<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sơn ❤️ Phương Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <div id="heart-container"></div>
    <div class="fixed inset-0 bg-gradient-to-tr from-rose-100/30 via-transparent to-teal-100/30 -z-10"></div>

    <header class="pt-12 pb-6 px-6 max-w-2xl mx-auto">
        <div class="flex justify-between items-end">
            <div>
                <p class="text-xs font-black tracking-[0.3em] text-rose-400 uppercase">Together Since 2024</p>
                <h1 class="text-3xl font-black text-slate-800">Sơn & Phương</h1>
            </div>
            <div class="bg-white/80 backdrop-blur-md p-3 rounded-2xl shadow-sm border border-white">
                <i class="fa-solid fa-cloud-sun text-orange-400 text-xl"></i>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 space-y-6">
        
        <section id="dashboard" class="tab-content active space-y-6">
            <div class="premium-card bg-slate-900 p-8 rounded-[2.5rem] text-white relative overflow-hidden shadow-2xl">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Available Funds</p>
                    <h2 class="text-4xl font-black mb-6" id="display-budget">0 ₫</h2>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/10 p-4 rounded-2xl">
                            <p class="text-[9px] text-slate-400 uppercase font-bold">Meal Avg</p>
                            <p class="text-lg font-bold text-rose-300" id="avg-meal-budget">0 ₫</p>
                        </div>
                        <div class="bg-white/10 p-4 rounded-2xl">
                            <p class="text-[9px] text-slate-400 uppercase font-bold">Date Avg</p>
                            <p class="text-lg font-bold text-teal-300" id="avg-date-budget">0 ₫</p>
                        </div>
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 text-9xl text-white/5 rotate-12">
                    <i class="fa-solid fa-heart"></i>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="deductQuick('Eating')" class="action-card bg-orange-50 p-6 rounded-[2rem] text-left border border-orange-100">
                    <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white mb-4 shadow-lg shadow-orange-200">
                        <i class="fa-solid fa-utensils"></i>
                    </div>
                    <p class="font-bold text-slate-800">Log Meal</p>
                    <p class="text-[10px] text-orange-600 font-bold uppercase" id="meals-left-label">30 Left</p>
                </button>
                <button onclick="deductQuick('Going Out')" class="action-card bg-teal-50 p-6 rounded-[2rem] text-left border border-teal-100">
                    <div class="w-10 h-10 bg-teal-500 rounded-full flex items-center justify-center text-white mb-4 shadow-lg shadow-teal-200">
                        <i class="fa-solid fa-champagne-glasses"></i>
                    </div>
                    <p class="font-bold text-slate-800">Date Night</p>
                    <p class="text-[10px] text-teal-600 font-bold uppercase" id="dates-left-label">4 Left</p>
                </button>
            </div>

            <div class="glass p-6 rounded-[2.5rem]">
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="text-sm font-bold text-slate-700 uppercase tracking-widest">Monthly Pulse</h3>
                    <button onclick="setBudget()" class="text-xs text-rose-500 font-bold">+ Reset</button>
                </div>
                <div class="h-64"><canvas id="spendingChart"></canvas></div>
            </div>
        </section>

        <section id="wishlist" class="tab-content space-y-6">
            <div class="glass p-6 rounded-[2rem] mb-6">
                <h3 class="text-sm font-black uppercase text-slate-400 mb-4 tracking-tighter">Add New Desire</h3>
                <div class="grid grid-cols-1 gap-3">
                    <input type="text" id="wish-item" placeholder="What do we want?" class="premium-input">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="wish-price" placeholder="Price (VND)" class="premium-input">
                        <select id="wish-owner" class="premium-input font-bold text-rose-500">
                            <option value="Sơn">For Sơn</option>
                            <option value="Phương">For Phương</option>
                        </select>
                    </div>
                    <input type="url" id="wish-link" placeholder="Product Link (Auto-Image)" class="premium-input">
                    <button onclick="addWish()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">Add to Wishlist</button>
                </div>
            </div>

            <div class="space-y-8">
                <div>
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest ml-4 mb-4">👸 Phương's Wishlist</h3>
                    <div id="wishlist-phuong" class="grid grid-cols-2 gap-4"></div>
                </div>
                <div>
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest ml-4 mb-4">🤵‍♂️ Sơn's Wishlist</h3>
                    <div id="wishlist-son" class="grid grid-cols-2 gap-4"></div>
                </div>
            </div>
        </section>

        <section id="history" class="tab-content space-y-4">
            <h2 class="text-xl font-black text-slate-800 ml-2">Recent Story</h2>
            <div id="log-list" class="space-y-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-6 left-6 right-6 z-[100]">
        <div class="max-w-md mx-auto glass rounded-[2.5rem] shadow-2xl p-2 flex justify-around items-center border border-white/50">
            <button onclick="showTab('dashboard')" class="nav-btn active" data-tab="dashboard">
                <i class="fa-solid fa-house-chimney-window"></i>
            </button>
            <button onclick="showTab('wishlist')" class="nav-btn" data-tab="wishlist">
                <i class="fa-solid fa-gift"></i>
            </button>
            <button onclick="showTab('history')" class="nav-btn" data-tab="history">
                <i class="fa-solid fa-list-ul"></i>
            </button>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
