<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơn ❤️ Phương - Our Little Corner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-rose-50 via-white to-teal-50 min-h-screen">

    <div id="heart-container"></div>

    <nav class="sticky top-0 z-50 px-4 py-3">
        <div class="max-w-4xl mx-auto glass rounded-2xl shadow-lg px-6 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-rose-500 flex items-center gap-2">
                <i class="fa-solid fa-heart-pulse animate-pulse"></i>
                <span class="hidden sm:inline">Sơn & Phương</span>
            </h1>
            <div class="flex space-x-4 text-[10px] font-bold uppercase tracking-widest text-slate-500">
                <button onclick="showTab('dashboard')" class="hover:text-rose-500 transition flex flex-col items-center">
                    <i class="fa-solid fa-wallet mb-1 text-lg"></i>Budget
                </button>
                <button onclick="showTab('wishlist')" class="hover:text-rose-500 transition flex flex-col items-center">
                    <i class="fa-solid fa-gift mb-1 text-lg"></i>Wishlist
                </button>
                <button onclick="showTab('history')" class="hover:text-rose-500 transition flex flex-col items-center">
                    <i class="fa-solid fa-clock-rotate-left mb-1 text-lg"></i>History
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 pb-20">
        <section id="dashboard" class="tab-content active space-y-6">
            <div class="text-center py-4">
                <h2 class="text-2xl font-bold text-slate-800">Hello, Sweetheart! ✨</h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-6 rounded-[2rem] shadow-xl border-rose-100 border-2">
                    <h3 class="text-[10px] font-black uppercase text-rose-400 tracking-widest mb-2">Total Budget</h3>
                    <div class="text-2xl font-black text-slate-800" id="display-budget">0 ₫</div>
                    <div class="mt-4 flex gap-2">
                        <input type="number" id="set-total-budget" placeholder="VND" class="w-full bg-white/50 border-none rounded-xl p-2 text-sm focus:ring-2 focus:ring-rose-200">
                        <button onclick="setBudget()" class="bg-rose-500 text-white px-3 rounded-xl"><i class="fa-solid fa-check"></i></button>
                    </div>
                </div>

                <div class="bg-slate-900 text-white p-6 rounded-[2rem] shadow-xl">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Meals Left</p>
                            <input type="number" id="meals-left" value="30" oninput="calculateAverages()" class="bg-transparent text-2xl font-black focus:outline-none w-16">
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Avg / Meal</p>
                            <p class="text-sm font-bold text-rose-400" id="avg-meal-budget">0 ₫</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input type="number" id="meal-cost" placeholder="Meal cost?" class="flex-1 bg-slate-800 border-none rounded-xl p-2 text-xs">
                        <button onclick="deductSpending('Eating', 'meal-cost', 'meals-left')" class="bg-rose-500 px-4 rounded-xl text-xs font-bold">Log</button>
                    </div>
                </div>

                <div class="bg-indigo-900 text-white p-6 rounded-[2rem] shadow-xl">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Dates Left</p>
                            <input type="number" id="dates-left" value="4" oninput="calculateAverages()" class="bg-transparent text-2xl font-black focus:outline-none w-16">
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Avg / Date</p>
                            <p class="text-sm font-bold text-cyan-400" id="avg-date-budget">0 ₫</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input type="number" id="date-cost" placeholder="Date cost?" class="flex-1 bg-indigo-800 border-none rounded-xl p-2 text-xs">
                        <button onclick="deductSpending('Going Out', 'date-cost', 'dates-left')" class="bg-cyan-500 px-4 rounded-xl text-xs font-bold">Log</button>
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-[2rem]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-slate-700"><i class="fa-solid fa-chart-pie mr-2 text-rose-400"></i>Breakdown</h3>
                    <button onclick="addManualExpense()" class="text-[10px] font-bold bg-slate-100 px-3 py-1 rounded-full">+ Shopping</button>
                </div>
                <div class="h-64"><canvas id="spendingChart"></canvas></div>
            </div>
        </section>

        <section id="wishlist" class="tab-content space-y-8">
            <div class="glass p-8 rounded-[2.5rem] shadow-xl">
                <h2 class="text-2xl font-black text-slate-800 mb-8"><i class="fa-solid fa-wand-magic-sparkles text-rose-400 mr-2"></i>Dream Together</h2>
                
                <div class="bg-white/40 p-6 rounded-3xl border border-white space-y-4 mb-10">
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        <select id="wish-owner" class="p-3 rounded-xl border-none text-sm font-bold glass">
                            <option value="Sơn">For Sơn 🤵‍♂️</option>
                            <option value="Phương">For Phương 👸</option>
                        </select>
                        <input type="number" id="wish-priority" placeholder="Prio (1-5)" class="p-3 rounded-xl border-none text-sm glass font-bold">
                        <input type="text" id="wish-item" placeholder="Item name..." class="col-span-2 p-3 rounded-xl border-none text-sm glass">
                    </div>
                    <div class="flex gap-3">
                        <input type="number" id="wish-price" placeholder="Price (VND)" class="flex-1 p-3 rounded-xl border-none text-sm glass">
                        <input type="url" id="wish-link" placeholder="Paste link..." class="flex-[2] p-3 rounded-xl border-none text-sm glass">
                        <button onclick="addWish()" class="bg-slate-900 text-white px-8 rounded-xl font-bold">+</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div>
                        <h3 class="text-xs font-black uppercase text-blue-400 mb-4 ml-2"><i class="fa-solid fa-shield-heart mr-2"></i>Sơn</h3>
                        <div id="wishlist-son" class="space-y-4"></div>
                    </div>
                    <div>
                        <h3 class="text-xs font-black uppercase text-rose-400 mb-4 ml-2"><i class="fa-solid fa-crown mr-2"></i>Phương</h3>
                        <div id="wishlist-phuong" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="history" class="tab-content space-y-6">
            <div class="glass p-8 rounded-[2.5rem] shadow-xl">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xl font-black">Expense Log</h2>
                    <button onclick="clearHistory()" class="text-rose-400 text-[10px] font-bold uppercase">Wipe Month</button>
                </div>
                <div id="log-list" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
